# ── Janus-MD Nginx Configuration ──
# Place the map blocks inside the http {} context of /etc/nginx/nginx.conf,
# and the server block in /etc/nginx/sites-available/.

# ── UA / Accept detection (http block) ───────────────────────────────────────

map $http_user_agent $is_ai_bot {
    default                 0;
    "~*ChatGPT-User"        1;
    "~*GPTBot"              1;
    "~*ClaudeBot"           1;
    "~*anthropic-ai"        1;
    "~*PerplexityBot"       1;
    "~*CCBot"               1;
    "~*OAI-SearchBot"       1;
    "~*Bytespider"          1;
    "~*Google-Extended"     1;
    "~*Applebot-Extended"   1;
    "~*meta-externalagent"  1;
}

map $http_accept $wants_markdown {
    default                 0;
    "~*text/markdown"       1;
}

map "$is_ai_bot:$wants_markdown" $serve_markdown {
    default     0;
    "1:0"       1;
    "0:1"       1;
    "1:1"       1;
}

# Canonical article URLs are /slug/.
# When AI/markdown negotiation is active, map /slug/ back to /slug.md.
map $uri $markdown_target {
    default     "$uri.md";
    "~^(.+)/$"  "$1.md";
}

# Only redirect /slug -> /slug/ for normal HTML requests.
map "$serve_markdown:$uri" $canonical_redirect {
    default             "";
    "~^0:(/[^.]+[^/])$" "$1/";
}

# ── Server block ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name example.com;
    root /var/www/janus-site/dist;

    error_page 418 = @markdown;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~* \.(css|js|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        gzip_static on;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location ~ ^/(.+)\.md$ {
        default_type "text/markdown; charset=utf-8";
        add_header X-Content-Source "markdown";
        add_header X-Robots-Tag "noindex";
        add_header Cache-Control "public, max-age=3600";
        add_header Vary "Accept, User-Agent" always;
        try_files $uri =404;
    }

    location @markdown {
        default_type "text/markdown; charset=utf-8";
        add_header X-Content-Source "markdown";
        add_header X-Robots-Tag "noindex";
        add_header Cache-Control "public, max-age=3600";
        add_header Vary "Accept, User-Agent" always;
        try_files $markdown_target @html;
    }

    location @html {
        set $target_file "${uri}index.html";
        try_files $target_file $uri $uri/ =404;
    }

    location / {
        if ($serve_markdown = 1) {
            return 418;
        }
        if ($canonical_redirect != "") {
            add_header Vary "Accept, User-Agent" always;
            return 301 https://$host$canonical_redirect;
        }
        try_files $uri @html;
    }
}
