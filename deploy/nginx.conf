# ── Janus-MD Nginx Configuration ──
# Place map blocks inside the http {} context of /etc/nginx/nginx.conf,
# and the server block in /etc/nginx/sites-available/.

# ── UA / Accept detection (http block) ───────────────────────────────────────

map $http_user_agent $is_ai_bot {
    default                 0;
    "~*ChatGPT-User"        1;
    "~*GPTBot"              1;
    "~*OAI-SearchBot"       1;
    "~*ClaudeBot"           1;
    "~*anthropic-ai"        1;
    "~*PerplexityBot"       1;
    "~*CCBot"               1;
    "~*Bytespider"          1;
    "~*Google-Extended"     1;
    "~*Applebot-Extended"   1;
    "~*meta-externalagent"  1;
}

map $http_accept $wants_markdown {
    default             0;
    "~*text/markdown"   1;
}

# Combined signal → single $serve_markdown variable
map "$is_ai_bot:$wants_markdown" $serve_markdown {
    default "0";
    "1:0"   "1";
    "0:1"   "1";
    "1:1"   "1";
}

# ── Server block ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name example.com;   # ← Replace with your domain
    root /var/www/janus-site/dist;

    # Redirect HTTP → HTTPS (enable after certbot setup)
    # return 301 https://$host$request_uri;

    # Explicit .md requests — serve with correct Content-Type, no UA check needed
    location ~ ^/(.+)\.md$ {
        default_type "text/markdown; charset=utf-8";
        add_header X-Content-Source "markdown";
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Feed, sitemap, llms.txt — static files, serve directly
    location ~ ^/(feed\.xml|sitemap\.xml|llms\.txt|robots\.txt)$ {
        try_files $uri =404;
    }

    # Static assets — long cache
    location ^~ /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Article routing (clean URLs) with dual-state content negotiation
    location / {
        set $target_file "$uri/index.html";
        if ($serve_markdown = "1") {
            set $target_file "$uri.md";
        }
        try_files $target_file $uri $uri/ /index.html =404;
    }
}

